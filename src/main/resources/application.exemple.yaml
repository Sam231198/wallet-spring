spring:
  application:
    name: wallet
  datasource:
    url: jdbc:postgresql://db:5432/wallet
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
